# Store Inventory
sql.inventory.find_by_store=SELECT spi.*, p.name as product_name FROM store_product_inventory spi JOIN product p ON spi.product_id=p.id WHERE spi.store_id=?
sql.inventory.find_by_product=SELECT * FROM store_product_inventory WHERE product_id=?
sql.inventory.insert=INSERT INTO store_product_inventory(store_id, product_id, quantity, min_limit, specs) VALUES(?,?,?,?,?)
sql.inventory.update=UPDATE store_product_inventory SET quantity=?, min_limit=?, specs=? WHERE store_id=? AND product_id=?
sql.inventory.delete=DELETE FROM store_product_inventory WHERE store_id=? AND product_id=?

# Companies
sql.company.find_all=SELECT * FROM company
sql.company.find_by_id=SELECT * FROM company WHERE id=?
sql.company.find_by_inn=SELECT * FROM company WHERE inn=?
sql.company.insert=INSERT INTO company(name, inn, rating) VALUES(?,?,?)

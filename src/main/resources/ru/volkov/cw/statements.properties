# Products
sql.product.find_all=SELECT * FROM product
sql.product.find_by_id=SELECT * FROM product WHERE id=?
sql.product.find_by_article=SELECT * FROM product WHERE article_number=?
sql.product.search=SELECT * FROM product WHERE name LIKE ? OR article_number LIKE ?
sql.product.insert=INSERT INTO product(name, article_number, price, brand_id, unit_id) VALUES(?,?,?,?,?)
sql.product.update=UPDATE product SET name=?, article_number=?, price=?, brand_id=?, unit_id=? WHERE id=?
sql.product.delete=DELETE FROM product WHERE id=?


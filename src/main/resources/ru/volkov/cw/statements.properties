sql.company.delete=DELETE FROM company WHERE id=?

# Deliveries
sql.delivery.find_all=SELECT d.*, c.name as company_name FROM delivery d LEFT JOIN company c ON d.company_id=c.id
sql.delivery.find_by_id=SELECT d.*, c.name as company_name FROM delivery d LEFT JOIN company c ON d.company_id=c.id WHERE d.id=?
sql.delivery.insert=INSERT INTO delivery(document_number, status, company_id) VALUES(?,?,?)
sql.delivery.update=UPDATE delivery SET document_number=?, status=?, company_id=? WHERE id=?
sql.delivery.delete=DELETE FROM delivery WHERE id=?

# Delivery Items
sql.delivery_item.find_by_delivery=SELECT di.*, p.name as product_name FROM delivery_item di JOIN product p ON di.product_id=p.id WHERE di.delivery_id=?
sql.delivery_item.insert=INSERT INTO delivery_item(delivery_id, product_id, quantity, price_per_unit) VALUES(?,?,?,?)
sql.delivery_item.update=UPDATE delivery_item SET quantity=?, price_per_unit=? WHERE delivery_id=? AND product_id=?
sql.delivery_item.delete=DELETE FROM delivery_item WHERE delivery_id=? AND product_id=?

# Price History
sql.price_history.find_all=SELECT ph.*, p.name as product_name FROM price_history ph JOIN product p ON ph.product_id=p.id ORDER BY ph.changed_at DESC
sql.price_history.find_by_product=SELECT ph.*, p.name as product_name FROM price_history ph JOIN product p ON ph.product_id=p.id WHERE ph.product_id=? ORDER BY ph.changed_at DESC
sql.price_history.find_by_date_range=SELECT ph.*, p.name as product_name FROM price_history ph JOIN product p ON ph.product_id=p.id WHERE ph.changed_at BETWEEN ? AND ? ORDER BY ph.changed_at DESC
sql.price_history.insert=INSERT INTO price_history(product_id, old_price, new_price) VALUES(?,?,?)

# Audit Log
sql.audit.find_all=SELECT * FROM audit_log ORDER BY timestamp DESC
sql.audit.find_by_table=SELECT * FROM audit_log WHERE table_name=? ORDER BY timestamp DESC
sql.audit.find_by_action=SELECT * FROM audit_log WHERE action=? ORDER BY timestamp DESC
sql.audit.find_by_date_range=SELECT * FROM audit_log WHERE timestamp BETWEEN ? AND ? ORDER BY timestamp DESC
sql.audit.insert=INSERT INTO audit_log(table_name, record_id, action, old_data, new_data, user_name) VALUES(?,?,?,?,?,?)
sql.audit.delete_old=DELETE FROM audit_log WHERE timestamp < ?

